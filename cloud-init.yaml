#cloud-config
# SFCompute cloud-init configuration for ACT training nodes
# This file sets up the VM with SSH access, installs dependencies,
# and prepares the environment for distributed training

disable_root: false
ssh_pwauth: false

# Configure users with SSH access
users:
  - name: root
    ssh_authorized_keys:
      # Add your SSH public keys here (replace with actual keys)
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIG... your-email@example.com
      # You can add multiple keys for team access:
      # - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIJ... teammate@example.com

# Package management
package_update: true
package_upgrade: true

packages:
  - git
  - wget
  - curl
  - htop
  - nvtop
  - tmux
  - unzip
  - build-essential
  - python3-pip
  - python3-dev
  - apt-transport-https
  - ca-certificates
  - gnupg

# Write configuration files
write_files:
  # Environment variables for training
  - path: /etc/profile.d/act_training.sh
    permissions: '0644'
    content: |
      # ACT Training Environment Variables
      export DATA_DIR="/data/dataset"
      export OUTPUT_DIR="/data/outputs"
      export CHECKPOINT_DIR="/data/checkpoints"
      export PYTHONUNBUFFERED=1
      export WANDB_MODE="online"
      export NCCL_DEBUG="INFO"
      
  # GCS credentials path (if using service account)
  - path: /root/.config/gcloud/setup_note.txt
    permissions: '0644'
    content: |
      # To authenticate with GCS, either:
      # 1. Copy your service account JSON key and run:
      #    gcloud auth activate-service-account --key-file=/path/to/key.json
      # 2. Or use: gcloud auth login

# Run commands on first boot
runcmd:
  # Create data directories on NVMe storage
  - mkdir -p /data/dataset
  - mkdir -p /data/outputs
  - mkdir -p /data/checkpoints
  - chmod -R 777 /data
  
  # Install Google Cloud SDK for gsutil (to download from GCS bucket)
  - curl -fsSL https://packages.cloud.google.com/apt/doc/apt-key.gpg | gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
  - echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" | tee /etc/apt/sources.list.d/google-cloud-sdk.list
  - apt-get update && apt-get install -y google-cloud-cli
  
  # Install NVIDIA Container Toolkit (for Docker with GPU support)
  - curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
  - curl -s -L https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list | sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' | tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
  - apt-get update && apt-get install -y nvidia-container-toolkit
  - nvidia-ctk runtime configure --runtime=docker
  - systemctl restart docker
  
  # Install Python ML dependencies (system-wide for non-containerized training)
  - pip3 install --upgrade pip
  - pip3 install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cu124
  - pip3 install numpy einops opencv-python pillow huggingface-hub timm safetensors h5py webdataset PyYAML matplotlib tqdm requests click pydantic wandb
  
  # Print setup completion message
  - echo "==================================================="
  - echo "SFCompute node setup complete!"
  - echo "NVMe storage mounted at: /data (2TB+)"
  - echo "GPU info:"
  - nvidia-smi --query-gpu=name,memory.total --format=csv
  - echo "==================================================="
  
  # Clone the ACT training repository (optional - can also be done manually)
  # - cd /data && git clone https://github.com/yourusername/ACT-test.git

# Final message
final_message: |
  =================================================
  SFCompute ACT Training Node Ready!
  
  Next steps:
  1. SSH into the node: sf nodes ssh root@<node-name>
  2. Authenticate with GCS: gcloud auth login
  3. Download data: /data/scripts/download_data.sh <GCS_BUCKET_PATH>
  4. Start training: cd /data/ACT-test && ./sfcompute_train.sh
  
  Storage: /data (NVMe, 2TB+)
  =================================================

