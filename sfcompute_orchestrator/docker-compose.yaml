# =============================================================================
# SFCompute Orchestrator - Docker Compose
# =============================================================================
# Local development and testing setup
#
# Usage:
#   docker-compose up -d          # Start all services
#   docker-compose logs -f        # View logs
#   docker-compose down           # Stop all services
#
# Submit a job:
#   curl -X POST http://localhost:8080/jobs \
#     -H "Content-Type: application/json" \
#     -d '{"data_gcs_path": "gs://your-bucket/data"}'
# =============================================================================

version: "3.8"

services:
  # ===========================================================================
  # Redis - Cache and Message Queue
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: sfcompute-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ===========================================================================
  # Orchestrator - All-in-one Service
  # ===========================================================================
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sfcompute-orchestrator
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - API_HOST=0.0.0.0
      - API_PORT=8080
      - DRY_RUN=true  # Set to false for production
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcs-key.json
    volumes:
      # Mount SF Compute config (for CLI authentication)
      - ~/.sf:/root/.sf:ro
      # Mount GCS credentials
      - ./gcs-key.json:/app/gcs-key.json:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ===========================================================================
  # Redis Commander - Web UI for Redis (optional, for debugging)
  # ===========================================================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: sfcompute-redis-ui
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      - redis
    profiles:
      - debug  # Only start with: docker-compose --profile debug up

volumes:
  redis-data:

