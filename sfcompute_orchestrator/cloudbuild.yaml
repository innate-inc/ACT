steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/lambda-orchestrator/app:$BUILD_ID'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/lambda-orchestrator/app:latest'
      - '.'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/lambda-orchestrator/app:$BUILD_ID'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/lambda-orchestrator/app:latest'

options:
  machineType: 'E2_HIGHCPU_8'
