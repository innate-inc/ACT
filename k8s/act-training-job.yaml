# =============================================================================
# ACT Training Job - Single Node (8x H100 GPUs)
# =============================================================================
# Kubernetes Job manifest for ACT training on SFCompute
#
# Usage:
#   kubectl apply -f act-training-job.yaml
#   kubectl logs -f act-training-0
#
# Data: Downloaded from GCS bucket to /data volume
# =============================================================================

apiVersion: batch/v1
kind: Job
metadata:
  name: act-training
  labels:
    app: act-training
spec:
  completions: 1
  parallelism: 1
  completionMode: Indexed
  backoffLimit: 2
  template:
    metadata:
      labels:
        job-name: act-training
        app: act-training
    spec:
      containers:
      - name: trainer
        # Replace with your Docker Hub image
        image: yourusername/act-training:latest
        imagePullPolicy: Always
        
        # Training command
        command:
        - /bin/bash
        - -c
        - |
          set -e
          echo "🚀 ACT Training Job Starting"
          echo "============================"
          
          # Check GPU availability
          echo "🎮 GPU Check:"
          nvidia-smi --query-gpu=name,memory.total --format=csv
          
          # Authenticate with GCS using workload identity or service account
          # Option 1: If using mounted service account key
          if [ -f /secrets/gcs-key.json ]; then
            echo "🔐 Authenticating with GCS service account..."
            gcloud auth activate-service-account --key-file=/secrets/gcs-key.json
          fi
          
          # Download data from GCS
          echo "📥 Downloading data from GCS..."
          DATA_GCS_PATH="gs://maurice-prod-data/data/socks1wed_socks2wed_filt_merged"
          LOCAL_DATA_DIR="/data/dataset"
          mkdir -p $LOCAL_DATA_DIR
          
          gcloud storage cp -r "${DATA_GCS_PATH}/*" "${LOCAL_DATA_DIR}/"
          
          echo "✅ Data downloaded:"
          ls -la $LOCAL_DATA_DIR/
          du -sh $LOCAL_DATA_DIR/
          
          # Run distributed training with torchrun
          echo "🏋️ Starting distributed training..."
          cd /app
          
          torchrun --standalone --nproc_per_node=8 \
            -m act_test.train_dist \
            --data_dir "${LOCAL_DATA_DIR}" \
            --chunk_size 30 \
            --max_steps 120000 \
            --learning_rate 5e-5 \
            --learning_rate_backbone 5e-5 \
            --batch_size 96 \
            --world_size 8
          
          TRAIN_EXIT=$?
          
          # Upload checkpoints to GCS
          echo "📤 Uploading checkpoints..."
          OUTPUT_GCS_PATH="gs://maurice-prod-data/ckpts"
          CKPT_DIR=$(find ${LOCAL_DATA_DIR}/checkpoints -maxdepth 1 -type d -name "*_ddp" | head -1)
          
          if [ -n "${CKPT_DIR}" ] && [ -d "${CKPT_DIR}" ]; then
            gcloud storage cp -r "${CKPT_DIR}" "${OUTPUT_GCS_PATH}/"
            echo "✅ Checkpoints uploaded to: ${OUTPUT_GCS_PATH}/$(basename ${CKPT_DIR})"
          fi
          
          echo "🎉 Training complete! Exit code: $TRAIN_EXIT"
          exit $TRAIN_EXIT
        
        ports:
        - containerPort: 29500
          name: dist-port
        
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: WANDB_MODE
          value: "online"
        - name: NCCL_DEBUG
          value: "INFO"
        - name: DATA_GCS_PATH
          value: "gs://maurice-prod-data/data/socks1wed_socks2wed_filt_merged"
        - name: OUTPUT_GCS_PATH
          value: "gs://maurice-prod-data/ckpts"
        # Add your W&B API key
        - name: WANDB_API_KEY
          value: "your-wandb-api-key"
        
        resources:
          requests:
            nvidia.com/gpu: 8
            nvidia.com/hostdev: 8
            memory: "512Gi"
            cpu: "32"
          limits:
            nvidia.com/gpu: 8
            nvidia.com/hostdev: 8
            memory: "512Gi"
            cpu: "32"
        
        volumeMounts:
        - name: data-volume
          mountPath: /data
        - name: shm
          mountPath: /dev/shm
        # Uncomment if using GCS service account key
        # - name: gcs-credentials
        #   mountPath: /secrets
        #   readOnly: true
      
      volumes:
      - name: data-volume
        emptyDir: {}
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: "64Gi"
      # Uncomment if using GCS service account key as Kubernetes secret
      # - name: gcs-credentials
      #   secret:
      #     secretName: gcs-key
      
      restartPolicy: Never

