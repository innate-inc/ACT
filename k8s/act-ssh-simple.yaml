# =============================================================================
# ACT SSH Pod - Simple Version (No Custom Docker Build Required!)
# =============================================================================
# Uses public NVIDIA PyTorch image - just apply and SSH in
#
# Usage:
#   kubectl apply -f act-ssh-simple.yaml
#   kubectl get pods -w                          # Wait for Running
#   kubectl port-forward pod/act-dev 2222:22    # In another terminal
#   ssh -p 2222 root@localhost                  # Connect!
#
# Inside the pod:
#   pip install einops wandb webdataset h5py timm  # Install deps
#   gcloud auth login                              # Auth with GCS
#   gcloud storage cp -r gs://maurice-prod-data/data/socks1wed_socks2wed_filt_merged /data/
#   # ... run your training
# =============================================================================

apiVersion: v1
kind: Pod
metadata:
  name: act-dev
  labels:
    app: act-training
spec:
  containers:
  - name: pytorch
    # Public NVIDIA PyTorch image - includes PyTorch, CUDA, cuDNN, NCCL
    image: nvcr.io/nvidia/pytorch:24.03-py3
    imagePullPolicy: IfNotPresent
    
    command:
    - /bin/bash
    - -c
    - |
      echo "🚀 Setting up SSH access..."
      
      # Install SSH server and Google Cloud CLI
      apt-get update && apt-get install -y openssh-server curl gnupg
      
      # Install gcloud CLI for GCS access
      curl -fsSL https://packages.cloud.google.com/apt/doc/apt-key.gpg | gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
      echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" | tee /etc/apt/sources.list.d/google-cloud-sdk.list
      apt-get update && apt-get install -y google-cloud-cli
      
      # Configure SSH for passwordless root login
      passwd -d root
      mkdir -p /etc/ssh /var/run/sshd
      cat >> /etc/ssh/sshd_config << EOF
      PermitRootLogin yes
      PasswordAuthentication yes
      PermitEmptyPasswords yes
      EOF
      
      echo ""
      echo "========================================"
      echo "🎉 SSH Pod Ready!"
      echo "========================================"
      echo ""
      echo "GPU Info:"
      nvidia-smi --query-gpu=name,memory.total --format=csv
      echo ""
      echo "Storage Info:"
      df -h /data
      echo ""
      echo "To connect (from your local machine):"
      echo "  1. kubectl port-forward pod/act-dev 2222:22"
      echo "  2. ssh -p 2222 root@localhost"
      echo ""
      echo "Once connected:"
      echo "  gcloud auth login"
      echo "  gcloud storage cp -r 'gs://maurice-prod-data/data/socks1wed_socks2wed_filt_merged/*' /data/"
      echo "  pip install einops wandb webdataset h5py timm safetensors huggingface-hub"
      echo "  git clone https://github.com/youruser/ACT-test.git && cd ACT-test && pip install -e ."
      echo "  python -m act_test.train_dist --data_dir /data"
      echo ""
      echo "========================================"
      
      # Start SSH daemon (keeps container running)
      /usr/sbin/sshd -D
    
    ports:
    - containerPort: 22
      name: ssh
    
    resources:
      requests:
        nvidia.com/gpu: 8
        nvidia.com/hostdev: 8
        memory: "512Gi"
        cpu: "32"
      limits:
        nvidia.com/gpu: 8
        nvidia.com/hostdev: 8
        memory: "512Gi"
        cpu: "32"
    
    volumeMounts:
    - name: data-volume
      mountPath: /data
    - name: shm
      mountPath: /dev/shm
  
  volumes:
  # Fast local NVMe storage for data
  - name: data-volume
    emptyDir: {}
  # Shared memory for PyTorch DataLoader
  - name: shm
    emptyDir:
      medium: Memory
      sizeLimit: "64Gi"
  
  restartPolicy: Never

